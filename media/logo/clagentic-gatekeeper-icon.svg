<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 112" width="112" height="112">
  <defs>
    <linearGradient id="grad" gradientUnits="userSpaceOnUse" x1="8" y1="8" x2="104" y2="104">
      <stop offset="0%"   stop-color="#00CFFF"/>
      <stop offset="45%"  stop-color="#4A7FE8"/>
      <stop offset="100%" stop-color="#7B3FE4"/>
    </linearGradient>
  </defs>

  <!-- Standard terminal frame -->
  <rect x="8" y="8" width="96" height="96" rx="8" ry="8"
        fill="none" stroke="url(#grad)" stroke-width="4.5"/>

  <!-- Shield outline: flat top, straight sides, curves to point at bottom center -->
  <!-- Top edge y=22, sides x=30/82, bottom point at 56,90 -->
  <path d="M 30 22 L 82 22 L 82 56 Q 82 74 56 90 Q 30 74 30 56 Z"
        fill="none" stroke="url(#grad)" stroke-width="2.5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Lock shackle: arc above lock body, centered horizontally at 56 -->
  <path d="M 49 54 L 49 47 A 7 7 0 0 1 63 47 L 63 54"
        fill="none" stroke="url(#grad)" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lock body: rounded rectangle -->
  <rect x="45" y="54" width="22" height="17" rx="3" ry="3"
        fill="none" stroke="url(#grad)" stroke-width="2.5"/>

  <!-- Keyhole: small filled circle inside lock body -->
  <circle cx="56" cy="63" r="2.5"
          fill="url(#grad)" stroke="none"/>

</svg>
