# GitHub Mirror Workflow
#
# Mirrors this Forgejo repo to its GitHub counterpart on every push to main.
# Runs on runner-github-mirror (account-scoped, LXC 107).
# GitHub destination org: ak-repo-mirror (private repos, isolated PAT)
#
# Auto-enrollment: new repos are mirrored automatically — no per-repo config needed.
# To exclude a repo permanently, add it to BLOCKLIST below.
#
# Email rewriting: rewrites all author/committer emails to the GitHub noreply
# address before pushing, bypassing GitHub's GH007 email privacy check.
#
# BLOCKLIST (never mirror these repos):
#   lore-state  — machine-generated session state, huge history, no backup value
#
# NAME OVERRIDES (Forgejo name → GitHub ak-repo-mirror name):
#   earworm-engine → the-spin
#   (all others mirror with the same name)
#
# Required env: GITHUB_MIRROR_TOKEN
#   Injected from /opt/homelab-runners/mirror.env on LXC 107 via docker-compose
#   env_file — no per-repo secret needed. GitHub PAT scoped to ak-repo-mirror org.

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: mirror
    steps:
      - name: Checkout full history
        uses: https://code.forgejo.org/actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Resolve GitHub repo name
        id: resolve
        run: |
          FORGEJO_REPO="${{ github.repository }}"
          REPO_NAME="${FORGEJO_REPO##*/}"

          # Blocklist: repos that should never be mirrored
          declare -A BLOCKLIST
          BLOCKLIST["lore-state"]=1

          if [ -n "${BLOCKLIST[$REPO_NAME]}" ]; then
            echo "Repo '$REPO_NAME' is blocklisted — skipping mirror"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Name overrides: Forgejo name → GitHub ak-repo-mirror name
          # Default: same name as Forgejo repo
          declare -A OVERRIDES
          OVERRIDES["earworm-engine"]="the-spin"

          GITHUB_NAME="${OVERRIDES[$REPO_NAME]:-$REPO_NAME}"
          echo "github_repo=ak-repo-mirror/${GITHUB_NAME}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Mirroring ${FORGEJO_REPO} → ak-repo-mirror/${GITHUB_NAME}"

      - name: Rewrite emails and push to GitHub
        if: steps.resolve.outputs.skip != 'true'
        env:
          # GITHUB_MIRROR_TOKEN is injected from /opt/homelab-runners/mirror.env
          # on LXC 107 via docker-compose env_file — no per-repo secret needed
          GITHUB_REPO: ${{ steps.resolve.outputs.github_repo }}
        run: |
          # Rewrite all author/committer emails to GitHub noreply address
          # This bypasses GitHub's GH007 email privacy check on push
          git filter-repo --force \
            --email-callback 'return b"41898282+github-actions[bot]@users.noreply.github.com"'

          # Push to GitHub (force-push required after history rewrite)
          git remote add github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/${GITHUB_REPO}.git"
          git push github main --force
