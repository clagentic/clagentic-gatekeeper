# AMoS configuration — clagentic-gatekeeper
#
# merge_allowed is permanently false for AMoS. Merge is NAOMI's exclusive
# capability (lr-5b95). AMoS opens PRs; it does not land them.

schema_version: 1

merge_allowed: false

branch_conventions:
  allowed_prefixes:
    - feat/
    - fix/
    - chore/
    - docs/
    - refactor/

scope:
  # allow_all: true — AMoS is a general repo builder and may write anywhere in
  # the project tree. blocked_paths still applies (deny wins). (lr-cec6:
  # allow_all + denylist model)
  allow_all: true
  blocked_paths: []

# Builder bot identity for commit attribution on GitHub clagentic/* pushes (lr-e241, lr-66c2).
# These are the GitHub App bot user's public identity — NOT secrets.
# Construct: GET https://api.github.com/users/clagentic-builder%5Bbot%5D → login + id.
# Email format: <bot_user_id>+<bot_login>@users.noreply.github.com
builder_identity:
  name: "clagentic-builder[bot]"
  email: "290147524+clagentic-builder[bot]@users.noreply.github.com"
