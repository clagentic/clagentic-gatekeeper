# Clagentic: Gatekeeper — example configuration.
#
# Copy to config.yaml and fill in your own values. config.yaml is gitignored.
# Every value here is deployment-specific. The code contains NO hardcoded
# org names, hostnames, secret paths, or identities — they all come from here.
#
# config_schema_version: 2 — bumped by lr-f1bfe8/lr-2ca216, which add the
# per-entry `identity_field` setting under attestation.sidecars (schema
# addition, back-compat: omitting it preserves version-1 behavior exactly)
# and the domain-aware fail-closed MISS semantics for an A2A-domain mint
# request (a resolution-policy change, not a config-shape change — see
# docs/SETUP.md and docs/SIDECAR-READ-CONTRACT.md).
config_schema_version: 2

# GitHub org/account the Apps are installed on.
github:
  # The org or user login that owns the target repositories.
  owner: your-org-name
  # GitHub API base. Override for GitHub Enterprise Server.
  api_base: https://api.github.com

# Secret broker. Pluggable: "openbao" | "vault" | "env" | "file".
# "env"/"file" exist for local dev and CI; "openbao"/"vault" for production.
broker:
  type: openbao
  # Endpoint of the broker. Ignored for type: env|file.
  endpoint: https://broker.example.com
  # Auth method against the broker: "approle" | "token".
  auth: approle
  # AppRole credentials are read from the environment, never committed:
  #   BROKER_ROLE_ID, BROKER_SECRET_ID   (auth: approle)
  #   BROKER_TOKEN                        (auth: token)

# Token policy.
token:
  # Installation token lifetime. GitHub caps at 1h.
  ttl_minutes: 60

# Attestation-provider chain: resolves the ATTESTED invoking identity, in
# order (a) configured -> (b) sidecar(s) -> (c) built-in fallback (always
# on, no config needed). All fields below are optional; a bare install with
# nothing set here still resolves via the built-in fallback. See
# internal/attestation for resolution order and the full design rationale.
attestation:
  # Layer (a): a deployment's own identity source. type: "env" | "file".
  # Leave type empty to disable this layer.
  configured:
    type: ""
    source: ""
  # Layer (b): the crew-sidecar adapter(s). Each entry is ONE adapter
  # behind the attestation interface, never assumed to exist — all three
  # fields (dir, file_prefix, session_id_env) are required together to
  # enable an entry; a partial entry is treated as disabled. Entries are
  # tried in the order listed; the first whose identity file is present
  # for the current invocation wins.
  #
  # A single deployment commonly needs more than one sidecar namespace:
  # one attesting the lead/session process, a different one attesting its
  # spawned subagents. The example below shows both — a session-scoped
  # namespace (crew-manifest's write-agent-sidecar.sh,
  # /tmp/lore-agent-name-<session_id>, keyed on CLAUDE_CODE_SESSION_ID)
  # and a per-spawn namespace (/tmp/spawn-<spawn_id>, keyed on
  # MY_HARNESS_SPAWN_ID — a fictional example var; substitute your own
  # harness's per-spawn env var name) — but nothing here hardcodes either
  # plugin as a dependency; leave the list empty to disable this layer
  # entirely.
  #
  # identity_field (lr-f1bfe8) is OPTIONAL and PER-ENTRY. Leave it unset (as
  # in the first entry below) to keep the original whole-file behavior: the
  # sidecar file's entire contents, trimmed of whitespace, become
  # Identity.Subject. Set it (as in the second entry below) to instead
  # treat the sidecar file as a STRUCTURED record (JSON or YAML) and read
  # the named field as Identity.Subject. The remaining recognized
  # attribution fields in a structured record — parent_session_id,
  # spawn_id, agent_type, spawned_at — are captured onto the resolved
  # Identity for cross-attribution/audit whenever present; none of them are
  # required, and their absence never fails the read. A structured sidecar
  # file that IS present but fails the contract (not parseable as JSON or
  # YAML, or identity_field itself absent/empty/non-string) is a hard,
  # fail-closed error naming the field — distinct from the file simply not
  # existing, which stays the normal "this layer declines" miss.
  sidecars:
    # Whole-file namespace (identity_field unset): the file's entire
    # contents are the attested Subject, exactly as before lr-f1bfe8.
    - dir: /tmp
      file_prefix: lore-agent-name-
      session_id_env: CLAUDE_CODE_SESSION_ID
    # Structured-record namespace (identity_field set): the sidecar file is
    # a JSON or YAML object, e.g.
    #   {"attested_name": "builder-agent", "parent_session_id": "session-1",
    #    "spawn_id": "spawn-42", "agent_type": "builder",
    #    "spawned_at": "2026-07-23T00:00:00Z"}
    # `attested_name` (substitute your own field name) becomes
    # Identity.Subject; the other four fields are captured for attribution
    # when present. This is the substrate the A2A caller-attestation
    # contract (docs/A2A-ATTESTATION-CONTRACT.md — the normative,
    # standalone required-fields contract; docs/SIDECAR-READ-CONTRACT.md
    # section 8/9 for the generalized read-mode mechanics) consumes for a
    # remote-facing credential's required-fields contract.
    - dir: /tmp
      file_prefix: spawn-
      session_id_env: MY_HARNESS_SPAWN_ID
      identity_field: attested_name
  # Deprecated: the legacy singular `sidecar:` block (dir/file_prefix/
  # session_id_env) is still accepted for back-compat and, when fully
  # configured, is tried before the `sidecars:` list above. New
  # deployments should use `sidecars:` instead — it is the only way to
  # configure more than one sidecar namespace. The legacy block does not
  # support identity_field; use `sidecars:` for a structured-record entry.

# Role definitions. Each role binds to one GitHub App and one permission set.
#
# Gatekeeper ships five reference roles (builder/reviewer/merger/security/reader)
# whose permission sets are defined in docs/ROLES.md. You may override or extend
# them here without forking code.
#
# To add a custom role:
#   1. Register a GitHub App with the desired permission set.
#   2. Add a roles.<name> block with broker paths for its credentials.
#   3. Add a permissions map to declare the narrowing. Gatekeeper will mint
#      a token restricted to exactly these permissions regardless of what the
#      App itself was granted.
#   4. Add entitled_identities so mint can verify the attested invoking
#      identity may mint this role.
#   5. Add app_slug + app_slug_path so mint can verify its broker paths
#      actually resolved to the App legitimately configured for this role.
#
# Permission values are "read" or "write". Keys are GitHub App permission
# resource names (see docs/ROLES.md and the GitHub Apps documentation).
# Tokens are rendered per-provider; today GitHub is the only provider.
# Forgejo scope-string rendering is added by lr-bb2f without changing this
# config schema.
#
# Mint-time verification (tome #700, layer (2)->(3)): both entitled_identities
# and the app_slug/app_slug_path pair are REQUIRED for a role to mint at all.
# Neither has an "open" default — a role missing either setting fails closed
# rather than minting with an unverified identity or an unverified App. This
# is why the example values below are filled in rather than left commented
# out: a role block copied from this file with the verification fields
# removed will refuse to mint until they are added back.
roles:
  builder:
    # Broker paths for this role's App credentials. The private key is read
    # server-side only and never returned to the caller.
    app_id_path: secret/gatekeeper/builder/app-id
    installation_id_path: secret/gatekeeper/builder/installation-id
    private_key_path: secret/gatekeeper/builder/private-key
    # Attested invoking identities (internal/attestation Identity.Subject
    # values) entitled to mint this role. List your deployment's actual
    # crew/agent identities here — there is no default entitlement.
    entitled_identities:
      - your-builder-agent-identity
    # Expected slug of the GitHub App these broker paths must resolve to,
    # and the broker path holding the App's ACTUAL slug (read at mint time
    # and compared against app_slug). Both are required together.
    app_slug: your-builder-app-slug
    app_slug_path: secret/gatekeeper/builder/app-slug

  reviewer:
    app_id_path: secret/gatekeeper/reviewer/app-id
    installation_id_path: secret/gatekeeper/reviewer/installation-id
    private_key_path: secret/gatekeeper/reviewer/private-key
    entitled_identities:
      - your-reviewer-agent-identity
    app_slug: your-reviewer-app-slug
    app_slug_path: secret/gatekeeper/reviewer/app-slug

  merger:
    app_id_path: secret/gatekeeper/merger/app-id
    installation_id_path: secret/gatekeeper/merger/installation-id
    private_key_path: secret/gatekeeper/merger/private-key
    entitled_identities:
      - your-merger-agent-identity
    app_slug: your-merger-app-slug
    app_slug_path: secret/gatekeeper/merger/app-slug

  security:
    app_id_path: secret/gatekeeper/security/app-id
    installation_id_path: secret/gatekeeper/security/installation-id
    private_key_path: secret/gatekeeper/security/private-key
    entitled_identities:
      - your-security-agent-identity
    app_slug: your-security-app-slug
    app_slug_path: secret/gatekeeper/security/app-slug

  reader:
    app_id_path: secret/gatekeeper/reader/app-id
    installation_id_path: secret/gatekeeper/reader/installation-id
    private_key_path: secret/gatekeeper/reader/private-key
    entitled_identities:
      - your-reader-agent-identity
    app_slug: your-reader-app-slug
    app_slug_path: secret/gatekeeper/reader/app-slug

  # --- Optional custom role example ---
  # A "releaser" role scoped only to what release automation needs:
  # push release tags (contents:write) and update release notes (pull_requests:read).
  # This demonstrates defining a 4th role via config alone — no code change needed.
  #
  # releaser:
  #   app_id_path: secret/gatekeeper/releaser/app-id
  #   installation_id_path: secret/gatekeeper/releaser/installation-id
  #   private_key_path: secret/gatekeeper/releaser/private-key
  #   permissions:
  #     contents: write
  #     pull_requests: read
  #   entitled_identities:
  #     - your-releaser-agent-identity
  #   app_slug: your-releaser-app-slug
  #   app_slug_path: secret/gatekeeper/releaser/app-slug
